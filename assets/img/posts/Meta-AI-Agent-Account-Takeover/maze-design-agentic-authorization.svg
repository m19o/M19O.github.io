<?xml version="1.0" encoding="UTF-8"?>
<svg width="1600" height="1150" viewBox="0 0 1600 1150" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Maze Design for Agentic Authorization</title>
  <desc id="desc">A controlled execution path showing how an AI agent request should pass through authorization gates before reaching privileged tools.</desc>

  <defs>
    <style>
      .bg { fill: #0f1117; }
      .title { font: 700 42px Arial, Helvetica, sans-serif; fill: #f4f4f5; }
      .subtitle { font: 400 22px Arial, Helvetica, sans-serif; fill: #bfc4d0; }
      .box-text { font: 700 22px Arial, Helvetica, sans-serif; fill: #ffffff; text-anchor: middle; dominant-baseline: middle; }
      .box-sub { font: 400 17px Arial, Helvetica, sans-serif; fill: #ffffff; text-anchor: middle; dominant-baseline: middle; }
      .dark-sub { font: 400 17px Arial, Helvetica, sans-serif; fill: #111111; text-anchor: middle; dominant-baseline: middle; }
      .label { font: 700 18px Arial, Helvetica, sans-serif; fill: #f4f4f5; text-anchor: middle; }
      .small-label { font: 700 16px Arial, Helvetica, sans-serif; fill: #f4f4f5; text-anchor: middle; }
      .note { font: 400 18px Arial, Helvetica, sans-serif; fill: #bfc4d0; }
      .agent { fill: #4488ff; stroke: #1f4fd6; stroke-width: 4; }
      .gate { fill: #ff8800; stroke: #b85f00; stroke-width: 4; }
      .safe { fill: #44aa44; stroke: #267326; stroke-width: 4; }
      .locked { fill: #232733; stroke: #707789; stroke-width: 4; }
      .challenge { fill: #ffcc00; stroke: #a88600; stroke-width: 4; }
      .block { fill: #ff4444; stroke: #a60000; stroke-width: 4; }
      .audit { fill: #666666; stroke: #333333; stroke-width: 4; }
      .line { fill: none; stroke: #d7dae2; stroke-width: 4; }
      .line-muted { fill: none; stroke: #8e95a6; stroke-width: 3; stroke-dasharray: 10 8; }
      .arrow-label-bg { fill: #0f1117; opacity: 0.94; }
    </style>

    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 Z" fill="#d7dae2"/>
    </marker>
    <marker id="arrow-muted" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 Z" fill="#8e95a6"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="1150"/>

  <text class="title" x="800" y="70">Maze Design</text>
  <text class="subtitle" x="800" y="110" text-anchor="middle">The agent can request the action. The system decides whether the action is allowed.</text>

  <!-- Nodes -->
  <g filter="url(#shadow)">
    <rect class="agent" x="610" y="160" width="380" height="95" rx="20"/>
    <text class="box-text" x="800" y="195">AI Agent</text>
    <text class="box-sub" x="800" y="225">Requests: change_email</text>

    <polygon class="gate" points="800,315 1035,395 800,475 565,395"/>
    <text class="box-text" x="800" y="376">GATE 1</text>
    <text class="box-sub" x="800" y="407">Privileged action?</text>

    <rect class="safe" x="170" y="340" width="330" height="110" rx="20"/>
    <text class="box-text" x="335" y="378">Safe Path</text>
    <text class="box-sub" x="335" y="410">Read-only / low-risk</text>

    <rect class="safe" x="170" y="525" width="330" height="105" rx="20"/>
    <text class="box-text" x="335" y="562">Execute</text>
    <text class="box-sub" x="335" y="594">Normal authorization</text>

    <rect class="locked" x="640" y="530" width="320" height="90" rx="20"/>
    <text class="box-text" x="800" y="565">Locked Path</text>
    <text class="box-sub" x="800" y="594">No direct execution</text>

    <polygon class="gate" points="800,675 1010,745 800,815 590,745"/>
    <text class="box-text" x="800" y="728">GATE 2</text>
    <text class="box-sub" x="800" y="758">Owns target account?</text>

    <polygon class="gate" points="800,860 1010,930 800,1000 590,930"/>
    <text class="box-text" x="800" y="913">GATE 3</text>
    <text class="box-sub" x="800" y="943">Policy allows action?</text>

    <rect class="challenge" x="1110" y="700" width="320" height="105" rx="20"/>
    <text class="box-text" x="1270" y="736" fill="#111111">Step-up</text>
    <text class="dark-sub" x="1270" y="768">Token / MFA / verified channel</text>

    <polygon class="gate" points="1270,860 1465,930 1270,1000 1075,930"/>
    <text class="box-text" x="1270" y="913">GATE 4</text>
    <text class="box-sub" x="1270" y="943">Abuse checks passed?</text>

    <rect class="safe" x="1110" y="1035" width="320" height="85" rx="20"/>
    <text class="box-text" x="1270" y="1078">Execute Tool</text>

    <rect class="block" x="110" y="875" width="330" height="105" rx="20"/>
    <text class="box-text" x="275" y="912">Block / Escalate</text>
    <text class="box-sub" x="275" y="944">No locked path bypass</text>

    <rect class="audit" x="610" y="1040" width="380" height="80" rx="20"/>
    <text class="box-text" x="800" y="1080">Audit Log Written</text>
  </g>

  <!-- Lines -->
  <path class="line" d="M800 255 L800 313" marker-end="url(#arrow)"/>
  <path class="line" d="M565 395 L500 395" marker-end="url(#arrow)"/>
  <path class="line" d="M335 450 L335 523" marker-end="url(#arrow)"/>

  <path class="line" d="M800 475 L800 528" marker-end="url(#arrow)"/>
  <path class="line" d="M800 620 L800 673" marker-end="url(#arrow)"/>
  <path class="line" d="M800 815 L800 858" marker-end="url(#arrow)"/>

  <path class="line" d="M1010 745 L1108 752" marker-end="url(#arrow)"/>
  <path class="line" d="M1270 805 L1270 858" marker-end="url(#arrow)"/>
  <path class="line" d="M1270 1000 L1270 1033" marker-end="url(#arrow)"/>

  <path class="line-muted" d="M590 745 C500 745 420 795 320 875" marker-end="url(#arrow-muted)"/>
  <path class="line-muted" d="M590 930 C515 930 470 930 442 930" marker-end="url(#arrow-muted)"/>
  <path class="line-muted" d="M1075 930 C930 930 640 960 438 930" marker-end="url(#arrow-muted)"/>

  <path class="line" d="M1270 1120 C1270 1135 800 1135 800 1122" marker-end="url(#arrow)"/>
  <path class="line-muted" d="M275 980 C275 1100 610 1080 608 1080" marker-end="url(#arrow-muted)"/>
  <path class="line-muted" d="M335 630 C335 1080 608 1080 608 1080" marker-end="url(#arrow-muted)"/>

  <!-- Edge labels -->
  <rect class="arrow-label-bg" x="505" y="360" width="55" height="30" rx="8"/>
  <text class="small-label" x="532" y="382">No</text>

  <rect class="arrow-label-bg" x="815" y="485" width="60" height="30" rx="8"/>
  <text class="small-label" x="845" y="507">Yes</text>

  <rect class="arrow-label-bg" x="1018" y="710" width="60" height="30" rx="8"/>
  <text class="small-label" x="1048" y="732">Yes</text>

  <rect class="arrow-label-bg" x="520" y="790" width="55" height="30" rx="8"/>
  <text class="small-label" x="547" y="812">No</text>

  <rect class="arrow-label-bg" x="520" y="895" width="55" height="30" rx="8"/>
  <text class="small-label" x="547" y="917">No</text>

  <rect class="arrow-label-bg" x="1012" y="895" width="55" height="30" rx="8"/>
  <text class="small-label" x="1039" y="917">No</text>

  <rect class="arrow-label-bg" x="820" y="825" width="60" height="30" rx="8"/>
  <text class="small-label" x="850" y="847">Yes</text>

  <rect class="arrow-label-bg" x="1285" y="1000" width="60" height="30" rx="8"/>
  <text class="small-label" x="1315" y="1022">Yes</text>

  <!-- Footer note -->
  <text class="note" x="80" y="1125">Sensitive actions move through locked gates before reaching tools. Failed and successful paths are logged.</text>
</svg>
